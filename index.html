<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO list</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My To‑Do </h1>
            <p class="subtitle">A clean, focused workspace for your tasks</p>
        </div>
        
        <div class="form-container">
            <form onsubmit="addTask(); return false;" class="js-form">
                <div class="input-group">
                    <input placeholder="What needs to be done?" class="todo-input" type="text" required>
                    <input type="date" class="date-input" required>
                </div>
                <button type="submit" class="add-btn">+ Add Task</button>
            </form>
        </div>
        
        <div class="tasks-container">
            <div class="js-List"></div>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
